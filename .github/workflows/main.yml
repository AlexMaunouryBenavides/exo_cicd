name : checker 
on : 
    push:
        branches: [main]

jobs:
    checker:
        name: run checker
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./server
        steps:
            - name: checkout 
              uses: actions/checkout@v5
              with: 
                fetch-depth: 0 
            - name: setup biome
              uses: biomejs/setup-biome@v2
              with:
                version: latest
            - name: Run Biome
              run: npm run lint
    typecheck:
      needs: checker
      name: run typecheck
      runs-on: ubuntu-latest
      defaults:
          run:
              working-directory: ./server
      steps:
          - name: checkout
            uses: actions/checkout@v5
            with: 
              fetch-depth: 0 
          - name: setup node
            uses: actions/setup-node@v6
            with:
              node-version: '24'
              cache: 'npm'
              cache-dependency-path: ./server/package-lock.json
          - name: install dependencies
            run: npm ci
          - name: run typecheck
            run: npm run typecheck

    tests:
        needs: typecheck
        name: run tests
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./server
        steps:
            - name: checkout 
              uses: actions/checkout@v5
              with: 
                fetch-depth: 0 
            - name: setup node
              uses: actions/setup-node@v6
              with:
                node-version: '24'
                cache: 'npm'
                cache-dependency-path: ./server/package-lock.json
            - name: install dependencies
              run: npm ci
            - name: run tests
              run: npm run test
            - name: build
              run: npm run build
