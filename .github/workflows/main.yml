name : checker 
on : 
    push:
        branches: [main]

jobs:
    checker:
        name: run checker
        runs-on: ubuntu-latest
        permissions: 
            checks: write 
            contents : write
        steps:
            - name: checkout 
              uses: actions/checkout@v3
              with: 
                fetch-depth: 0 
            - name: setup biome
              uses: biomejs/setup-biome@v2
            - name: run biome check
              run: npm run lint

    tests:
        name: run tests
        runs-on: ubuntu-latest
        steps:
            - name: checkout 
              uses: actions/checkout@v3
              with: 
                fetch-depth: 0 
            - name: setup node
              uses: actions/setup-node@v3
              with:
                node-version: '24'
            - name: install dependencies
              run: npm install
            - name: run tests
              run: npm run test
            - name: build
              run: npm run build
